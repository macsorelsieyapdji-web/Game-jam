<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/openTab.js"></script>
    <script src="js/difficulty.js"></script>
</head>

<body class="home">
    <div class="background-anim"></div>
    <div class="home-container">
    <h1 class="glitch" data-text="OPTION">OPTION</h1>
    <p class="subtitle">Modifie tes paramatre pour te rendre le jeu le plus agreable possible</p>
    
    <!--tableau de choix du type de parametre-->
    <div class="option-screen">
        <nav class="option-menu">
            <button class="tab-btn active" onclick="openTab(event, 'audio')">AUDIO</button>
            <button class="tab-btn" onclick="openTab(event, 'video')">VIDEO</button>
            <button class="tab-btn" onclick="openTab(event, 'gameplay')">JEU</button>
        </nav>
        
        <!--categorie audio-->
        <div class="option-content">
            <div id="audio" class="tab-content" style="display:block;">
                <h3>Parametre audio</h3>

                 <!--Curseur de réglage du volume-->
                <div class="option-item">
                    <label>Volume Général</label>
                    <input type="range" class="custom-slider">
                </div>
            </div>
                
            <!--catégorie video-->
            <div id="video" class="tab-content" style="display:none;">
                <h3>Parametre video</h3>

                 <!--Curseur de réglage de la luminosité-->
                <div class="option-item">
                    <label>Luminosité</label>
                    <input type="range" class="custom-slider">
                </div>
            </div>
           
            <!--categorie jeu-->
            <div id="gameplay" class="tab-content" style="display:none;">
                <h3>Parametre Jeu</h3>

                 <!--Curseur de réglage de la difficulté-->
                <div class="option-item">
                        <label for="difficulty">Difficulté</label>
                        <div class="slider-box">
                            <input type="range" id="difficulty" name="difficulty" min="0" max="100" value="50" class="custom-slider">
                            <span id="diff-value">50%</span>
                        </div>
            </div>
        </div>
    </div>

    <!--bouton de retour au menu principal-->
    <button class="btn-secondary" onclick="location.href='index.html'">
        ⬅ Retour au menu
      </button>
    </div>
</body>
</html>
