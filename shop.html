<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Nothing is Safe – Shop</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="home">

  <div class="home-container">
    <h1>Shop</h1>

    <p>Coins : <span id="coins"></span></p>

    <div class="menu-grid">
      <button class="menu-btn" onclick="buy('skin_red')">Skin Rouge (50)</button>
      <button class="menu-btn" onclick="buy('skin_blue')">Skin Bleu (50)</button>
      <button class="menu-btn" onclick="buy('skin_gold')">Skin Or (100)</button>
    </div>

    <button class="play-btn" onclick="location.href='index.html'">Retour</button>
  </div>

  <script>
    let coins = parseInt(localStorage.getItem("coins") || "0");
    document.getElementById("coins").textContent = coins;

    function buy(item) {
      let cost = 50;
      if (item === "skin_gold") cost = 100;

      if (coins >= cost) {
        coins -= cost;
        localStorage.setItem("coins", coins);
        localStorage.setItem("skin", item);
        alert("Acheté !");
        location.reload();
      } else {
        alert("Pas assez de coins !");
      }
    }
  </script>

</body>
</html>
