<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nothing is Safe – Accueil</title>

  <!-- Ton CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap" rel="stylesheet">
</head>

<body class="home">
  <div class="screen-overlay"></div>

  <div class="home-container">
    <header>
      <h1 class="glitch" data-text="Nothing is Safe">Nothing is Safe</h1>
      <p class="subtitle">Surveillez vos arrières. Tout peut vous trahir.</p>
    </header>

    <div class="play-section">
      <button class="play-btn" onclick="startGamePage()">
        <span class="icon">▶</span> LANCER LA SURVIE
      </button>
    </div>

    <div class="menu-grid">
      <button class="menu-btn" onclick="location.href='options.html'">⚙ OPTIONS</button>
      <button class="menu-btn" onclick="location.href='shop.html'">🛒 BOUTIQUE</button>
      <button class="menu-btn mode-hardcore" onclick="setMode('hardcore')">💀 HARDCORE</button>
      <button class="menu-btn mode-normal" onclick="setMode('normal')">🛡️ NORMAL</button>
    </div>

    <div class="level-box">
      <label for="startLevel">Difficulté initiale : <span id="levelValue">1</span></label>
      <input id="startLevel" type="range" min="1" max="10" value="1"
             oninput="updateLevel(this.value)">
    </div>
  </div>

  <!-- Ton script JS -->
  <script src="js/home.js"></script>
</body>
</html>
