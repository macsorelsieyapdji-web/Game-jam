<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Nothing is Safe – Accueil</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="home">

  <div class="home-container">
    <h1>Nothing is Safe</h1>
    <p class="subtitle">Survive in a world where everything can betray you.</p>

    <!-- BOUTON PLAY -->
    <button class="play-btn" onclick="location.href='game.html'">▶ Play</button>

    <!-- MENU PRINCIPAL -->
    <div class="menu-grid">
      <button class="menu-btn" onclick="location.href='options.html'">Options</button>
      <button class="menu-btn" onclick="location.href='shop.html'">Shop</button>
      <button class="menu-btn" onclick="localStorage.setItem('mode','hardcore')">Mode Hardcore</button>
      <button class="menu-btn" onclick="localStorage.setItem('mode','normal')">Mode Normal</button>
    </div>

    <!-- NIVEAU DE DÉPART -->
    <div class="level-box">
      <label>Niveau de départ :</label><br>
      <input id="startLevel" type="range" min="1" max="10" value="1"
             oninput="localStorage.setItem('startLevel', this.value)">
    </div>
  </div>

</body>
</html>
